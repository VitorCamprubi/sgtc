# --- DB ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/sgtc?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:sgtc}
spring.datasource.password=${DB_PASS:sgtc2420}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- CORS (Angular) ---
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# --- Upload ---
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# --- JWT ---
security.jwt.secret=${JWT_SECRET:sgtc-dev-jwt-secret-key-32-bytes-minimum}
security.jwt.expiration-minutes=60

# --- E-mail (SMTP) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# --- Aplicacao (links em emails) ---
app.mail.from=${MAIL_FROM:no-reply@sgtc.local}
app.mail.from-name=${MAIL_FROM_NAME:SGTC - Sistema de Gerenciamento de Trabalhos Cientificos}
app.mail.enabled=${MAIL_ENABLED:true}
app.url.api=${APP_API_URL:http://localhost:8080}
app.url.web=${APP_WEB_URL:http://localhost:4200}
